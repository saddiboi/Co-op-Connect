<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Work Term Reports - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>All Work Term Reports</h1>
      <p class="content-subtitle">Review all student submissions</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-content">
          <span class="stat-title">Submitted Reports</span>
          <span class="stat-value">156</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-content">
          <span class="stat-title">Pending Review</span>
          <span class="stat-value">23</span>
        </div>
      </div>
    </div>

    <div class="content-column full-width">
      <div class="column-card">
        <h2>All Reports</h2>
        <div class="terms-list">
          <div class="term-item">
            <span>John Doe - Winter 2024 - Tech Corp - A</span>
            <button class="btn-small">View</button>
          </div>
          <div class="term-item">
            <span>Sarah Johnson - Winter 2024 - Innovation Labs - Pending</span>
            <button class="btn-small">Assign Grade</button>
          </div>
        </div>
        <div class="grade-form">
          <select id="gradeSelect">
            <option>A</option>
            <option>B</option>
            <option>C</option>
          </select>
          <button>Assign Grade</button>
        </div>
      </div>
    </div>

    <script src="../../assets/js/firebase.js"></script>
    <script src="../../assets/js/navigation.js"></script>
  </div>
</body>
</html>
