<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Work Term Reports - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>My Work Term Reports</h1>
      <p class="content-subtitle">Submit and track your work term reports</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-content">
          <span class="stat-title">Current Term</span>
          <span class="stat-value">Winter 2024</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-content">
          <span class="stat-title">Reports</span>
          <span class="stat-value" id="reportCount">4</span>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="content-column">
        <div class="column-card">
          <h2 class="column-title">My Reports</h2>
          <div class="terms-list">
            <div class="term-item">
              <div class="term-info">
                <span class="term-season">Winter 2024 - Tech Corp</span>
                <span class="term-grade">Due Mar 15</span>
              </div>
              <div class="term-status">
                <span class="status-badge pending">Pending</span>
                <button class="quick-view-btn">Upload</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="content-column">
        <div class="column-card">
          <h2>Upload Report</h2>
          <input type="file" accept=".pdf">
          <textarea placeholder="Notes"></textarea>
          <button class="btn-primary">Submit</button>
        </div>
      </div>
    </div>

    <script src="../../assets/js/firebase.js"></script>
    <script src="../../assets/js/navigation.js"></script>
  </div>
</body>
</html>
