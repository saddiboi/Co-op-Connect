<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Evaluation Reports - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>My Evaluation Reports</h1>
      <p class="content-subtitle">Submit and review evaluations for your work terms</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-content">
          <span class="stat-title">Evaluations Due</span>
          <span class="stat-value">2</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-content">
          <span class="stat-title">Avg Rating</span>
          <span class="stat-value">4.5</span>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="content-column">
        <div class="column-card">
          <h2 class="column-title">Evaluations to Complete</h2>
          <div class="terms-list">
            <div class="term-item">
              <div class="term-info">
                <span class="term-season">Winter 2024</span>
                <span class="term-employer">Tech Corp</span>
                <span class="term-grade">Due Mar 1</span>
              </div>
              <div class="term-status">
                <span class="status-badge pending">Pending</span>
                <button class="quick-view-btn">Complete</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="content-column">
        <div class="column-card">
          <h2 class="column-title">Past Evaluations</h2>
          <div class="terms-list">
            <div class="term-item">
              <div class="term-info">
                <span class="term-season">Fall 2023</span>
                <span class="term-employer">StartupXYZ</span>
                <span class="term-grade">4.8/5</span>
              </div>
              <div class="term-status">
                <span class="status-badge completed">Completed</span>
                <button class="quick-view-btn small">Review</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../../assets/js/firebase.js"></script>
    <script src="../../assets/js/navigation.js"></script>
  </div>
</body>
</html>
