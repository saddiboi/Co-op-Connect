<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grades - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Grades</h1>
      <p class="content-subtitle">Assign work term grades</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-content">
          <span class="stat-title">Pending Grades</span>
          <span class="stat-value">23</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-content">
          <span class="stat-title">Avg Grade</span>
          <span class="stat-value">A-</span>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="content-column full-width">
      <div class="filter-bar">
        <div class="form-group">
          <label for="termFilter">Term</label>
          <select id="termFilter">
            <option>All Terms</option>
            <option>Winter 2024</option>
            <option>Fall 2023</option>
          </select>
        </div>
        <div class="form-group">
          <label for="gradeFilter">Grade Status</label>
          <select id="gradeFilter">
            <option>All</option>
            <option>Pending</option>
            <option>Assigned</option>
          </select>
        </div>
        <button class="btn-primary">Export Grades</button>
      </div>
    </div>

    <!-- Grades Table -->
    <div class="content-column full-width">
      <div class="column-card">
        <h2 class="column-title">Grade Assignments</h2>
        <div class="terms-list">
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">John Doe</span>
              <span class="term-employer">Winter 2024 - Tech Corp</span>
              <span class="term-grade">Report submitted</span>
            </div>
            <div class="term-status">
              <span class="status-badge pending">-</span>
              <select class="grade-select">
                <option>-</option>
                <option>A+</option>
                <option>A</option>
                <option>B+</option>
              </select>
              <button class="btn-small">Save</button>
            </div>
          </div>
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">Sarah Johnson</span>
              <span class="term-employer">Winter 2024 - Innovation Labs</span>
              <span class="term-grade">Report approved</span>
            </div>
            <div class="term-status">
              <span class="status-badge completed">A</span>
              <button class="btn-small secondary">Edit</button>
            </div>
          </div>
        </div>
        <div class="pagination">
          <button>&laquo; Previous</button>
          <span>Page 1 of 8</span>
          <button>Next &raquo;</button>
        </div>
      </div>
    </div>

    <script src="../../assets/js/firebase.js"></script>
    <script src="../../assets/js/navigation.js"></script>
  </div>
</body>
</html>
