<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Students</h1>
      <p class="content-subtitle" id="coordinatorStudentSubtitle">Students assigned to your coordinator account.</p>
    </div>

    <div class="stats-grid coordinator-report-stats">
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title" id="coordinatorStudentCountLabel">Assigned Students</span>
          <span class="stat-value" id="coordinatorAssignedStudentCount">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Students With Email</span>
          <span class="stat-value" id="coordinatorAssignedStudentEmailCount">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Coordinators</span>
          <div class="coordinator-load-list" id="coordinatorStudentLoadList">
            <span class="applications-empty-state">Loading coordinators...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="content-column full-width">
      <div class="filter-bar coordinator-applications-filter">
        <div class="form-group">
          <label for="coordinatorStudentSearch">Search Students</label>
          <input type="text" id="coordinatorStudentSearch" placeholder="Search by name or email">
        </div>
      </div>
    </div>

    <div class="content-column full-width">
      <div class="column-card">
        <div class="student-list-header-row">
          <h2 class="column-title" id="coordinatorStudentListTitle">Student List</h2>
          <div class="student-view-toggle" role="group" aria-label="Student list view">
            <button class="quick-view-btn active" type="button" id="coordinatorStudentMyViewBtn">My Students</button>
            <button class="quick-view-btn" type="button" id="coordinatorStudentAllViewBtn">All Students</button>
          </div>
        </div>
        <div class="applications-list" id="coordinatorAssignedStudentsList">
          <div class="applications-empty-state">Loading assigned students...</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
