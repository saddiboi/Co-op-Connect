<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Students</h1>
      <p class="content-subtitle">Manage students in your program</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👨‍🎓</div>
        <div class="stat-content">
          <span class="stat-title">Total Students</span>
          <span class="stat-value">150</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚠️</div>
        <div class="stat-content">
          <span class="stat-title">Needs Attention</span>
          <span class="stat-value">8</span>
        </div>
      </div>
    </div>

    <!-- Filter/Search Bar -->
    <div class="content-column full-width">
      <div class="filter-bar">
        <div class="form-group">
          <label for="studentSearch">Search Students</label>
          <input type="text" id="studentSearch" placeholder="Name, ID, email...">
        </div>
        <div class="form-group">
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option>All</option>
            <option>Active</option>
            <option>Inactive</option>
            <option>Graduated</option>
          </select>
        </div>
        <button class="btn-primary">Add Student</button>
      </div>
    </div>

    <!-- Students Table -->
    <div class="content-column full-width">
      <div class="column-card">
        <h2 class="column-title">Student List</h2>
        <div class="terms-list">
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">John Doe</span>
              <span class="term-employer">TMU2023005</span>
              <span class="term-grade">john@example.com</span>
            </div>
            <div class="term-status">
              <span class="status-badge active">Active - 2 terms</span>
              <div class="action-buttons">
                <button class="quick-view-btn small">Profile</button>
                <button class="btn-small">Reports</button>
              </div>
            </div>
          </div>
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">Sarah Johnson</span>
              <span class="term-employer">TMU2023012</span>
              <span class="term-grade">sarah@tmu.ca</span>
            </div>
            <div class="term-status">
              <span class="status-badge warning">Incomplete Report</span>
              <div class="action-buttons">
                <button class="btn-small danger">Contact</button>
              </div>
            </div>
          </div>
        </div>
        <div class="pagination">
          <button>&laquo; Previous</button>
          <span>Page 1 of 15</span>
          <button>Next &raquo;</button>
        </div>
      </div>
    </div>

<script src="../../assets/js/firebase.js"></script>
    <script src="../../assets/js/role-manager.js"></script>
    <script src="../../assets/js/navigation.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const container = document.querySelector('.subscreen-container');
        if (window.initRoleUI) window.initRoleUI(container);
      });
    </script>
  </div>
</body>
</html>
