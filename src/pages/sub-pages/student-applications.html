<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>My Applications</h1>
      <p class="content-subtitle">Track your job applications</p>
    </div>

    <!-- Filter Bar -->
    <div class="content-column full-width">
      <div class="filter-bar">
        <div class="form-group">
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option>All</option>
            <option>Applied</option>
            <option>Interview</option>
            <option>Offer</option>
            <option>Rejected</option>
          </select>
        </div>
        <div class="form-group">
          <label for="termFilter">Term</label>
          <select id="termFilter">
            <option>Any Term</option>
            <option>Winter 2024</option>
            <option>Fall 2023</option>
          </select>
        </div>
        <button class="btn-primary">New Application</button>
      </div>
    </div>

    <!-- Applications List -->
    <div class="content-column full-width">
      <div class="column-card">
        <h2 class="column-title">My Applications</h2>
        <div class="terms-list">
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">Winter 2024</span>
              <span class="term-employer">Tech Corp Inc. - Software Developer</span>
              <span class="term-grade">Applied: Jan 15</span>
            </div>
            <div class="term-status">
              <span class="status-badge pending">Interview Scheduled</span>
              <div class="action-buttons">
                <button class="quick-view-btn small">View</button>
                <button class="btn-small">Withdraw</button>
              </div>
            </div>
          </div>
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">Winter 2024</span>
              <span class="term-employer">Innovation Labs - Data Analyst</span>
              <span class="term-grade">Applied: Jan 10</span>
            </div>
            <div class="term-status">
              <span class="status-badge completed">Offer Accepted</span>
              <div class="action-buttons">
                <button class="quick-view-btn small">Details</button>
              </div>
            </div>
          </div>
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">Fall 2023</span>
              <span class="term-employer">StartupXYZ - UX Designer</span>
              <span class="term-grade">Applied: Sep 20</span>
            </div>
            <div class="term-status">
              <span class="status-badge rejected">Not Selected</span>
              <div class="action-buttons">
                <button class="quick-view-btn small">View Feedback</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../../assets/js/firebase.js"></script>
    <script src="../../assets/js/navigation.js"></script>
  </div>
</body>
</html>
