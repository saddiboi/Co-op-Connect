<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coordinator Profile - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Coordinator Info</h1>
      <p class="content-subtitle">Manage your coordinator account</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-content">
          <span class="stat-title">Students Supervised</span>
          <span class="stat-value">150</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📧</div>
        <div class="stat-content">
          <span class="stat-title">Email Verified</span>
          <span class="stat-value">Yes</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏢</div>
        <div class="stat-content">
          <span class="stat-title">Employers Managed</span>
          <span class="stat-value">48</span>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- Coordinator Profile Form -->
      <div class="content-column">
        <div class="column-card">
          <h2 class="column-title">Coordinator Details</h2>
          
          <div class="form-group">
            <label>Program Managed</label>
            <input type="text" value="Computer Science Co-op">
          </div>
          
          <div class="form-group">
            <label>Total Students Supervised</label>
            <input type="number" value="150" readonly>
          </div>
          
          <div class="form-group">
            <label>Contact Email</label>
            <input type="email" value="coordinator@tmu.ca">
          </div>
          
          <!-- Common fields -->
          <div class="form-group">
            <label for="email">Primary Email</label>
            <input type="email" id="email" value="coord@example.com">
          </div>
          
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" value="Dr. Smith">
          </div>
          
          <button id="saveProfile" class="btn-primary full-width">Save Changes</button>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="content-column">
        <div class="column-card">
          <h2 class="column-title">Recent Activity</h2>
          <div class="terms-list">
            <div class="term-item">
              <div class="term-info">
                <span class="term-season">Student approved</span>
                <span class="term-employer">2 hours ago</span>
              </div>
            </div>
            <div class="term-item">
              <div class="term-info">
                <span class="term-season">Report reviewed</span>
                <span class="term-employer">Mar 10, 2024</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../../assets/js/firebase.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const saveBtn = document.getElementById('saveProfile');
        if (saveBtn) {
          saveBtn.addEventListener('click', function() {
            alert('Coordinator profile updated!');
          });
        }
      });
    </script>
  </div>
</body>
</html>
