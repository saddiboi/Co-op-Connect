<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coordinator Evaluation Reports - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Evaluation Reports</h1>
      <p class="content-subtitle">Review all student evaluations from employers</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-content">
          <span class="stat-title">Avg Rating</span>
          <span class="stat-value">4.2</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-content">
          <span class="stat-title">Total Evaluations</span>
          <span class="stat-value">156</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚠️</div>
        <div class="stat-content">
          <span class="stat-title">Pending Review</span>
          <span class="stat-value">12</span>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="content-column full-width">
      <div class="filter-bar">
        <div class="form-group">
          <label for="termFilter">Term</label>
          <select id="termFilter">
            <option>All Terms</option>
            <option>Winter 2024</option>
            <option>Fall 2023</option>
          </select>
        </div>
        <div class="form-group">
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option>All</option>
            <option>Pending Review</option>
            <option>Reviewed</option>
          </select>
        </div>
        <button class="btn-primary">Export Report</button>
      </div>
    </div>

    <!-- Evaluations Table -->
    <div class="content-column full-width">
      <div class="column-card">
        <h2 class="column-title">Evaluation Reports</h2>
        <div class="terms-list">
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">John Doe</span>
              <span class="term-employer">Winter 2024 - Tech Corp</span>
              <span class="term-grade">4.5/5 - A</span>
            </div>
            <div class="term-status">
              <span class="status-badge completed">Reviewed</span>
              <button class="btn-small">View Details</button>
            </div>
          </div>
          <div class="term-item">
            <div class="term-info">
              <span class="term-season">Sarah Johnson</span>
              <span class="term-employer">Fall 2023 - StartupXYZ</span>
              <span class="term-grade">Pending Review</span>
            </div>
            <div class="term-status">
              <span class="status-badge pending">Pending</span>
              <button class="btn-small">Review</button>
            </div>
          </div>
        </div>
        <div class="pagination">
          <button>&laquo; Previous</button>
          <span>Page 1 of 15</span>
          <button>Next &raquo;</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/firebase.js"></script>
  <script>
    // Simple JS for demo
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.btn-small').forEach(btn => {
        btn.addEventListener('click', function() {
          alert('Opening evaluation details...');
        });
      });
    });
  </script>
</body>
</html>
